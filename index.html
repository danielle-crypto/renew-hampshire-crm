<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#0f1923; color:#e0e0e0; }
.header { background:linear-gradient(135deg,#1a2332,#243447); padding:24px 32px; border-bottom:1px solid #2a3a4a; display:flex; justify-content:space-between; align-items:center; }
.header h1 { font-size:24px; color:#4fc3f7; }
.header .subtitle { color:#78909c; font-size:14px; }
.header .stats { display:flex; gap:24px; }
.stat { text-align:center; }
.stat .num { font-size:28px; font-weight:700; color:#4fc3f7; }
.stat .label { font-size:11px; color:#78909c; text-transform:uppercase; letter-spacing:1px; }
.filters { padding:16px 32px; background:#1a2332; border-bottom:1px solid #2a3a4a; display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
.filter-btn { padding:6px 16px; border-radius:20px; border:1px solid #2a3a4a; background:transparent; color:#90a4ae; cursor:pointer; font-size:13px; transition:all 0.2s; }
.filter-btn:hover, .filter-btn.active { background:#4fc3f7; color:#0f1923; border-color:#4fc3f7; }
.search { padding:8px 16px; border-radius:20px; border:1px solid #2a3a4a; background:#0f1923; color:#e0e0e0; font-size:14px; width:250px; outline:none; }
.search:focus { border-color:#4fc3f7; }
.container { padding:24px 32px; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:16px; }
.card { background:#1a2332; border-radius:12px; border:1px solid #2a3a4a; padding:20px; transition:all 0.2s; cursor:pointer; }
.card:hover { border-color:#4fc3f7; transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,0.3); }
.card .name { font-size:18px; font-weight:600; color:#fff; margin-bottom:4px; }
.card .category { display:inline-block; padding:2px 10px; border-radius:12px; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:12px; }
.cat-seller { background:#e91e6320; color:#f48fb1; border:1px solid #e91e6340; }
.cat-buyer { background:#4caf5020; color:#81c784; border:1px solid #4caf5040; }
.cat-client { background:#ff980020; color:#ffb74d; border:1px solid #ff980040; }
.cat-vendor { background:#9c27b020; color:#ce93d8; border:1px solid #9c27b040; }
.cat-agent { background:#2196f320; color:#64b5f6; border:1px solid #2196f340; }
.cat-lead { background:#f4433620; color:#ef9a9a; border:1px solid #f4433640; }
.cat-past { background:#60738020; color:#90a4ae; border:1px solid #60738040; }
.cat-pm { background:#ff980020; color:#ffb74d; border:1px solid #ff980040; }
.cat-default { background:#60738020; color:#90a4ae; border:1px solid #60738040; }
.card .info { font-size:13px; color:#90a4ae; line-height:1.6; }
.card .info strong { color:#b0bec5; }
.card .property { margin-top:8px; padding:8px 12px; background:#0f192320; border-radius:8px; border-left:3px solid #4fc3f7; font-size:13px; color:#b0bec5; }
.card .notes { margin-top:10px; font-size:12px; color:#78909c; font-style:italic; border-top:1px solid #2a3a4a; padding-top:8px; }
.card .follow-up { margin-top:8px; padding:6px 12px; background:#f4433615; border-radius:6px; border-left:3px solid #f44336; font-size:12px; color:#ef9a9a; }
.modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:100; justify-content:center; align-items:center; }
.modal-overlay.show { display:flex; }
.modal { background:#1a2332; border-radius:16px; border:1px solid #2a3a4a; padding:32px; max-width:600px; width:90%; max-height:80vh; overflow-y:auto; }
.modal h2 { color:#4fc3f7; margin-bottom:16px; }
.modal .close { float:right; background:none; border:none; color:#78909c; font-size:24px; cursor:pointer; }
.modal .close:hover { color:#fff; }
.modal .field { margin-bottom:12px; }
.modal .field label { font-size:12px; color:#78909c; text-transform:uppercase; letter-spacing:1px; }
.modal .field .value { font-size:15px; color:#e0e0e0; margin-top:2px; }
.modal .history { margin-top:16px; }
.modal .history h3 { color:#b0bec5; font-size:14px; margin-bottom:8px; }
.modal .history-item { padding:10px; background:#0f1923; border-radius:8px; margin-bottom:8px; font-size:13px; line-height:1.5; }
.modal .history-item .date { color:#4fc3f7; font-weight:600; }
.edit-btn { display:inline-block; margin-top:16px; padding:10px 20px; background:#4fc3f7; color:#0f1923; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; text-decoration:none; transition:all 0.2s; }
.edit-btn:hover { background:#81d4fa; transform:translateY(-1px); }
.edit-btn-small { display:inline-block; padding:4px 10px; background:transparent; color:#4fc3f7; border:1px solid #4fc3f7; border-radius:6px; font-size:11px; font-weight:600; cursor:pointer; text-decoration:none; transition:all 0.2s; margin-left:8px; vertical-align:middle; }
.edit-btn-small:hover { background:#4fc3f7; color:#0f1923; }
@media(max-width:768px) { .header { flex-direction:column; gap:16px; } .grid { grid-template-columns:1fr; } .search { width:100%; } }
</style>

function getCategoryClass(cat) {
  const c = (cat||'').toLowerCase();
  if (c.includes('seller')) return 'cat-seller';
  if (c.includes('buyer')) return 'cat-buyer';
  if (c.includes('active lead')) return 'cat-lead';
  if (c.includes('lead')) return 'cat-lead';
  if (c.includes('vendor') || c.includes('property manage')) return 'cat-vendor';
  if (c.includes('agent')) return 'cat-agent';
  if (c.includes('past')) return 'cat-past';
  if (c.includes('client')) return 'cat-client';
  return 'cat-default';
}

function getFilterMatch(cat, filter) {
  if (filter === 'all') return true;
  const c = (cat||'').toLowerCase();
  if (filter === 'seller') return c.includes('seller');
  if (filter === 'buyer') return c.includes('buyer');
  if (filter === 'client') return c.includes('client') || c.includes('property manage');
  if (filter === 'lead') return c.includes('lead');
  if (filter === 'vendor') return c.includes('vendor') || c.includes('property manager');
  if (filter === 'agent') return c.includes('agent');
  if (filter === 'past') return c.includes('past');
  return true;
}

let currentFilter = 'all';
let searchTerm = '';

function renderContacts() {
  const grid = document.getElementById('contactGrid');
  const filtered = contacts.filter(c => {
    const matchFilter = getFilterMatch(c.category, currentFilter);
    const matchSearch = !searchTerm || 
      c.name.toLowerCase().includes(searchTerm) ||
      (c.email||'').toLowerCase().includes(searchTerm) ||
      (c.properties||[]).join(' ').toLowerCase().includes(searchTerm) ||
      (c.notes||'').toLowerCase().includes(searchTerm);
    return matchFilter && matchSearch;
  });

  grid.innerHTML = filtered.map((c, i) => {
    const catClass = getCategoryClass(c.category);
    const props = (c.properties||[]).filter(p => p && p !== '(none identified yet)');
    const followUp = (c.notes||'').match(/FOLLOW UP:([^\n]*)/);
    
    const editUrl = c.filename ? `https://github.com/danielle-crypto/renew-hampshire-crm/edit/main/contacts/${c.filename}` : '#';
    return `<div class="card" onclick="showContact(${contacts.indexOf(c)})">
      <div class="name">${c.name} ${c.filename ? `<a class="edit-btn-small" href="${editUrl}" target="_blank" onclick="event.stopPropagation()">✏️ Edit</a>` : ''}</div>
      <span class="category ${catClass}">${c.category||'Uncategorized'}</span>
      <div class="info">
        ${c.email && c.email !== '—' ? `<div>📧 <strong>${c.email}</strong></div>` : ''}
        ${c.phone && c.phone !== '—' ? `<div>📱 ${c.phone}</div>` : ''}
        ${c.address && c.address !== '—' ? `<div>📍 ${c.address}</div>` : ''}
      </div>
      ${props.length ? `<div class="property">🏠 ${props.join(', ')}</div>` : ''}
      ${followUp ? `<div class="follow-up">⚡ ${followUp[1].trim()}</div>` : ''}
    </div>`;
  }).join('');

  // Update stats
  document.getElementById('totalContacts').textContent = contacts.length;
  document.getElementById('activeLeads').textContent = contacts.filter(c => 
    (c.category||'').toLowerCase().includes('lead') || 
    (c.category||'').toLowerCase().includes('active')
  ).length;
  document.getElementById('followUps').textContent = contacts.filter(c => 
    (c.notes||'').includes('FOLLOW UP')
  ).length;
}

function showContact(idx) {
  const c = contacts[idx];
  const modal = document.getElementById('modal');
  const content = document.getElementById('modalContent');
  const catClass = getCategoryClass(c.category);
  
  content.innerHTML = `
    <h2>${c.name}</h2>
    <span class="category ${catClass}">${c.category||'Uncategorized'}</span>
    <div style="margin-top:16px">
      <div class="field"><label>Email</label><div class="value">${c.email||'—'}</div></div>
      <div class="field"><label>Phone</label><div class="value">${c.phone||'—'}</div></div>
      <div class="field"><label>Address</label><div class="value">${c.address||'—'}</div></div>
      <div class="field"><label>Source</label><div class="value">${c.source||'—'}</div></div>
      <div class="field"><label>Properties</label><div class="value">${(c.properties||[]).join('<br>')||'None identified'}</div></div>
    </div>
    <div class="history">
      <h3>Interaction History</h3>
      ${(c.interactions||[]).map(h => `
        <div class="history-item">
          <span class="date">${h.date}</span> — ${h.subject}<br>
          <span style="color:#78909c">${h.summary}</span>
        </div>
      `).join('')}
    </div>
    ${c.notes ? `<div style="margin-top:16px;padding:12px;background:#0f1923;border-radius:8px;font-size:13px;color:#90a4ae">${c.notes.replace(/\n/g,'<br>')}</div>` : ''}
    ${c.filename ? `<a class="edit-btn" href="https://github.com/danielle-crypto/renew-hampshire-crm/edit/main/contacts/${c.filename}" target="_blank">✏️ Edit Contact on GitHub</a>` : ''}
  `;
  modal.classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentFilter = this.dataset.filter;
    renderContacts();
  });
});

document.getElementById('search').addEventListener('input', function() {
  searchTerm = this.value.toLowerCase();
  renderContacts();
});

renderContacts();
</script>
